<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Perk Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f0b09;
  --bg2:    #1a1410;
  --bg3:    #241c16;
  --bg4:    #2d2018;
  --acc:    #d79f49;
  --acc2:   #f0c060;
  --text:   #f1dfb6;
  --muted:  #8a7055;
  --border: rgba(215,159,73,0.18);
  --danger: #c04848;
  --r:      8px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; -webkit-tap-highlight-color: transparent; }

/* ── Header ── */
.hdr {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
}
.hdr-title { flex: 1; font-size: 15px; font-weight: 700; color: var(--acc); }
.unsaved { font-size: 11px; color: var(--acc); opacity: .7; }
.hdr-btn { padding: 7px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 12px; cursor: pointer; white-space: nowrap; }
.hdr-btn.primary { border-color: var(--acc); color: var(--acc); }

/* ── Tree tabs ── */
.tabs-wrap { background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 2px; padding: 6px 8px; min-width: max-content; }
.tab {
  padding: 7px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; border: 1.5px solid transparent;
  color: var(--muted); transition: all .15s;
}
.tab.active { background: var(--bg4); border-color: var(--acc); color: var(--acc); }
.tab-add { padding: 7px 12px; border-radius: 20px; font-size: 16px; color: var(--muted); cursor: pointer; border: 1.5px dashed var(--border); transition: all .15s; }
.tab-add:hover, .tab-add:active { color: var(--acc); border-color: var(--acc); }

/* ── Tree meta bar ── */
.tree-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border);
}
.meta-field { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
.meta-field input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 5px 8px; font-size: 13px; width: 130px; }
.meta-field input.sm { width: 52px; text-align: center; font-size: 17px; }
.btn-del-tree { margin-left: auto; padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(192,72,72,.35); background: none; color: var(--danger); font-size: 12px; cursor: pointer; }

/* ── Node list ── */
.nodes-list { padding: 10px 10px 120px; display: flex; flex-direction: column; gap: 6px; }
.node-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: var(--r);
  background: var(--bg3); border: 1.5px solid var(--border);
  cursor: pointer; transition: all .15s; user-select: none;
}
.node-card:active, .node-card.sel { background: var(--bg4); border-color: var(--acc); }
.node-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.node-info { flex: 1; min-width: 0; }
.node-name { font-weight: 700; font-size: 14px; }
.node-desc { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-meta { font-size: 11px; color: var(--acc); margin-top: 1px; }
.node-req-badge { font-size: 10px; background: rgba(215,159,73,.12); color: var(--acc); padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.btn-add-node {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 13px; border-radius: var(--r);
  border: 1.5px dashed var(--border); background: none;
  color: var(--muted); font-size: 13px; cursor: pointer;
  width: 100%; transition: all .15s;
}
.btn-add-node:active { color: var(--acc); border-color: var(--acc); }

/* ── Bottom sheet ── */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.55);
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 101;
  background: var(--bg2); border-top: 1px solid var(--border); border-radius: 14px 14px 0 0;
  transform: translateY(100%); transition: transform .25s cubic-bezier(.32,0,.67,0);
  max-height: 90vh; display: flex; flex-direction: column;
}
.sheet.open { transform: translateY(0); transition: transform .25s cubic-bezier(.33,1,.68,1); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 2px; flex-shrink: 0; }
.sheet-head { display: flex; align-items: center; gap: 8px; padding: 6px 14px 10px; flex-shrink: 0; }
.sheet-head-title { flex: 1; font-weight: 700; font-size: 15px; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg3); color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.sheet-del { padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(192,72,72,.35); background: none; color: var(--danger); font-size: 12px; cursor: pointer; }
.sheet-body { flex: 1; overflow-y: auto; padding: 0 14px 24px; display: flex; flex-direction: column; gap: 12px; }

/* ── Form fields ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--muted); font-weight: 600; }
.field input, .field textarea, .field select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 9px 11px; font-size: 14px; font-family: inherit;
  width: 100%; transition: border-color .15s; -webkit-appearance: none;
}
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--acc); }
.field textarea { min-height: 60px; resize: vertical; }
.field input.icon-f { font-size: 20px; text-align: center; max-width: 70px; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.costs-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
.costs-wrap input { width: 72px; }
.sep { height: 1px; background: var(--border); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; z-index: 200;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg4); border: 1px solid var(--acc); color: var(--acc);
  padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: all .2s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Desktop: side-by-side sheet ── */
@media (min-width: 700px) {
  .sheet { left: auto; right: 0; top: 0; bottom: 0; border-radius: 0; border-left: 1px solid var(--border); border-top: none; max-height: none; width: 320px; transform: translateX(100%); }
  .sheet.open { transform: translateX(0); }
  .sheet-handle { display: none; }
  .sheet-overlay { display: none; }
}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">⛏ Perk Editor</span>
  <span class="unsaved" id="unsaved" hidden>●</span>
  <button class="hdr-btn" id="btn-copy">📋</button>
  <button class="hdr-btn primary" id="btn-save">💾 Сохранить</button>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div id="tree-meta" class="tree-meta"></div>

<div id="nodes-list" class="nodes-list"></div>

<!-- Bottom sheet overlay -->
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-head-title" id="sheet-title">Узел</span>
    <button class="sheet-del" id="sheet-del">Удалить</button>
    <button class="sheet-close" id="sheet-close">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div id="toast"></div>

<script type="module">
const { SHOP_TREES } = await import(`./src/shop-config.js?t=${Date.now()}`);

// ─── State ─────────────────────────────────────────────────────────────────
const S = {
  trees:     JSON.parse(JSON.stringify(SHOP_TREES)),
  activeIdx: 0,
  selId:     null,
  dirty:     false,
};

const tree  = () => S.trees[S.activeIdx];
const node  = () => S.selId ? tree().nodes.find(n => n.id === S.selId) : null;

function markDirty() { S.dirty = true; document.getElementById('unsaved').hidden = false; }
function clearDirty() { S.dirty = false; document.getElementById('unsaved').hidden = true; }

// ─── Toast ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Sheet ─────────────────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  S.selId = null;
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('sel'));
}

// ─── Serialize ─────────────────────────────────────────────────────────────
function serialize() {
  const ln = [];
  ln.push(`/**\n * Конфигурация магазина прокачки.\n *\n * Структура:\n *   SHOP_TREES — массив деревьев прокачки.\n *\n * Каждое дерево:\n *   id       — уникальный строковый идентификатор\n *   name     — отображаемое название\n *   icon     — символ/emoji для таба\n *   nodes    — массив узлов дерева\n *\n * Каждый узел:\n *   id       — уникальный строковый идентификатор\n *   name     — отображаемое название\n *   icon     — символ/emoji\n *   desc     — описание эффекта одного уровня\n *   maxLevel — максимальный уровень (1 = разовая покупка)\n *   costs    — массив цен в золотое по уровням (length == maxLevel)\n *   row      — строка в сетке дерева (0 = верхний ряд)\n *   col      — столбец в сетке дерева (0 = левый)\n *   requires — id узла-родителя (null = корневой узел)\n *\n * Чтобы следующий уровень стал доступен, предыдущий должен быть куплен хотя бы на 1.\n * Чтобы дочерний узел (requires) стал доступен, родитель должен быть хотя бы на уровне 1.\n */`);
  ln.push(`\nexport const SHOP_TREES = [`);
  for (const t of S.trees) {
    ln.push(`  {\n    id: ${JSON.stringify(t.id)},\n    name: ${JSON.stringify(t.name)},\n    icon: ${JSON.stringify(t.icon)},\n    nodes: [`);
    for (const n of t.nodes) {
      const req = (n.requires === null || n.requires === '') ? 'null' : JSON.stringify(n.requires);
      ln.push(`      {\n        id: ${JSON.stringify(n.id)},\n        name: ${JSON.stringify(n.name)},\n        icon: ${JSON.stringify(n.icon)},\n        desc: ${JSON.stringify(n.desc)},\n        maxLevel: ${n.maxLevel},\n        costs: [${n.costs.join(', ')}],\n        row: ${n.row},\n        col: ${n.col},\n        requires: ${req},\n      },`);
    }
    ln.push(`    ],\n  },\n`);
  }
  ln.push(`];\n`);
  return ln.join('\n');
}

// ─── Save ──────────────────────────────────────────────────────────────────
let fileHandle = null;
async function saveFile() {
  try {
    if (!fileHandle) fileHandle = await window.showSaveFilePicker({ suggestedName: 'src/shop-config.js', startIn: 'documents', types: [{ description: 'JavaScript', accept: { 'text/javascript': ['.js'] } }] });
    const w = await fileHandle.createWritable();
    await w.write(serialize());
    await w.close();
    clearDirty(); toast('Сохранено!');
  } catch(e) { if (e.name !== 'AbortError') { fileHandle = null; toast('Ошибка'); } }
}

// ─── Render tabs ───────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML =
    S.trees.map((t, i) =>
      `<div class="tab ${i === S.activeIdx ? 'active' : ''}" data-ti="${i}">${t.icon} ${t.name}</div>`
    ).join('') +
    `<div class="tab-add" id="btn-add-tree">＋</div>`;
}

// ─── Render tree meta ──────────────────────────────────────────────────────
function renderTreeMeta() {
  const t = tree();
  document.getElementById('tree-meta').innerHTML = `
    <div class="meta-field">id <input id="t-id" value="${esc(t.id)}"></div>
    <div class="meta-field">name <input id="t-name" value="${esc(t.name)}"></div>
    <div class="meta-field">icon <input id="t-icon" value="${esc(t.icon)}" class="sm"></div>
    <button class="btn-del-tree" id="btn-del-tree">Удалить</button>
  `;
  document.getElementById('t-id').onchange    = e => { t.id   = e.target.value; markDirty(); renderTabs(); };
  document.getElementById('t-name').oninput   = e => { t.name = e.target.value; markDirty(); renderTabs(); };
  document.getElementById('t-icon').oninput   = e => { t.icon = e.target.value; markDirty(); renderTabs(); };
  document.getElementById('btn-del-tree').onclick = delTree;
}

// ─── Render node list ──────────────────────────────────────────────────────
function renderList() {
  const sorted = [...tree().nodes].sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);
  const reqName = id => tree().nodes.find(n => n.id === id)?.name ?? id;

  document.getElementById('nodes-list').innerHTML =
    sorted.map(n => `
      <div class="node-card ${S.selId === n.id ? 'sel' : ''}" data-nid="${esc(n.id)}">
        <div class="node-icon">${n.icon}</div>
        <div class="node-info">
          <div class="node-name">${esc(n.name)}</div>
          <div class="node-desc">${esc(n.desc)}</div>
          <div class="node-meta">Lv${n.maxLevel} &nbsp;·&nbsp; ${n.costs.join(' / ')} ●
            ${n.requires ? `&nbsp;<span class="node-req-badge">← ${esc(reqName(n.requires))}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('') +
    `<button class="btn-add-node" id="btn-add-node">＋ Добавить узел</button>`;

  document.querySelectorAll('.node-card').forEach(el =>
    el.addEventListener('click', () => { S.selId = el.dataset.nid; renderList(); renderSheetBody(); openSheet(); })
  );
  document.getElementById('btn-add-node').onclick = addNode;
}

// ─── Sheet body ────────────────────────────────────────────────────────────
function renderSheetBody() {
  const n = node();
  if (!n) return;

  document.getElementById('sheet-title').textContent = n.name || 'Узел';

  const reqOpts = [
    `<option value="">— нет —</option>`,
    ...tree().nodes.filter(nd => nd.id !== n.id).map(nd =>
      `<option value="${esc(nd.id)}" ${nd.id === n.requires ? 'selected' : ''}>${esc(nd.name)}</option>`
    ),
  ].join('');

  document.getElementById('sheet-body').innerHTML = `
    <div class="field-row">
      <div class="field" style="flex:0 0 auto">
        <label>Иконка</label>
        <input id="n-icon" class="icon-f" value="${esc(n.icon)}">
      </div>
      <div class="field">
        <label>Название</label>
        <input id="n-name" value="${esc(n.name)}">
      </div>
    </div>
    <div class="field">
      <label>id (технический)</label>
      <input id="n-id" value="${esc(n.id)}">
    </div>
    <div class="field">
      <label>Описание</label>
      <textarea id="n-desc">${esc(n.desc)}</textarea>
    </div>
    <div class="sep"></div>
    <div class="field-row">
      <div class="field">
        <label>Max уровень</label>
        <input id="n-maxlvl" type="number" min="1" max="20" value="${n.maxLevel}">
      </div>
      <div class="field">
        <label>Строка (row)</label>
        <input id="n-row" type="number" min="0" value="${n.row}">
      </div>
      <div class="field">
        <label>Столбец (col)</label>
        <input id="n-col" type="number" min="0" value="${n.col}">
      </div>
    </div>
    <div class="field">
      <label>Цены (× уровень)</label>
      <div class="costs-wrap" id="costs-wrap">
        ${n.costs.map((c, i) => `<input class="ci" type="number" data-i="${i}" value="${c}" min="1">`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Требует (requires)</label>
      <select id="n-req">${reqOpts}</select>
    </div>
    <div class="sep"></div>
    <div class="field">
      <label>Переместить в категорию</label>
      <select id="n-move">
        ${S.trees.map((t, i) => `<option value="${i}" ${i === S.activeIdx ? 'selected' : ''}>${esc(t.icon)} ${esc(t.name)}</option>`).join('')}
      </select>
    </div>
  `;

  // bind
  const live = (id, fn) => document.getElementById(id)?.addEventListener('input', e => { fn(e.target.value); markDirty(); });
  const change = (id, fn) => document.getElementById(id)?.addEventListener('change', e => { fn(e.target.value); markDirty(); });

  live('n-name', v => { n.name = v; document.getElementById('sheet-title').textContent = v || 'Узел'; renderList(); });
  live('n-icon', v => { n.icon = v; renderList(); });
  live('n-desc', v => { n.desc = v; renderList(); });

  change('n-id', v => {
    const old = n.id;
    n.id = v;
    tree().nodes.forEach(nd => { if (nd.requires === old) nd.requires = v; });
    S.selId = v;
    renderList();
  });

  change('n-maxlvl', v => {
    const lvl = Math.max(1, +v || 1);
    n.maxLevel = lvl;
    while (n.costs.length < lvl) n.costs.push(Math.round((n.costs.at(-1) || 50) * 1.8));
    while (n.costs.length > lvl) n.costs.pop();
    markDirty();
    // re-render costs only
    document.getElementById('costs-wrap').innerHTML =
      n.costs.map((c, i) => `<input class="ci" type="number" data-i="${i}" value="${c}" min="1">`).join('');
    document.querySelectorAll('.ci').forEach(el =>
      el.addEventListener('change', e => { n.costs[+el.dataset.i] = +e.target.value || 1; markDirty(); })
    );
    renderList();
  });

  document.querySelectorAll('.ci').forEach(el =>
    el.addEventListener('change', e => { n.costs[+el.dataset.i] = +e.target.value || 1; markDirty(); })
  );

  change('n-row', v => { n.row = Math.max(0, +v || 0); renderList(); });
  change('n-col', v => { n.col = Math.max(0, +v || 0); renderList(); });
  change('n-req',  v => { n.requires = v || null; renderList(); });

  change('n-move', v => {
    const targetIdx = +v;
    if (targetIdx === S.activeIdx) return;
    // remove from current tree
    const cur = tree();
    const idx = cur.nodes.findIndex(nd => nd.id === n.id);
    if (idx === -1) return;
    cur.nodes.splice(idx, 1);
    // clear requires if it pointed to a node in the old tree
    n.requires = null;
    // add to target tree
    S.trees[targetIdx].nodes.push(n);
    S.activeIdx = targetIdx;
    markDirty();
    renderTabs();
    renderTreeMeta();
    renderList();
    renderSheetBody();
  });
}

// ─── Actions ───────────────────────────────────────────────────────────────
function addTree() {
  S.trees.push({ id: `tree_${S.trees.length + 1}`, name: 'Новое', icon: '✦', nodes: [] });
  S.activeIdx = S.trees.length - 1;
  S.selId = null;
  markDirty(); render();
}

function delTree() {
  if (S.trees.length <= 1) { toast('Нельзя удалить единственное дерево'); return; }
  if (!confirm(`Удалить «${tree().name}»?`)) return;
  S.trees.splice(S.activeIdx, 1);
  S.activeIdx = Math.min(S.activeIdx, S.trees.length - 1);
  S.selId = null;
  markDirty(); closeSheet(); render();
}

function addNode() {
  const maxRow = tree().nodes.reduce((m, n) => Math.max(m, n.row), -1);
  const id = `node_${Date.now()}`;
  tree().nodes.push({ id, name: 'Новый', icon: '✦', desc: 'Описание', maxLevel: 1, costs: [50], row: maxRow + 1, col: 0, requires: null });
  S.selId = id;
  markDirty(); renderList(); renderSheetBody(); openSheet();
}

function delNode() {
  if (!S.selId || !confirm('Удалить узел?')) return;
  const id = S.selId;
  tree().nodes = tree().nodes.filter(n => n.id !== id);
  tree().nodes.forEach(n => { if (n.requires === id) n.requires = null; });
  S.selId = null;
  markDirty(); closeSheet(); renderList();
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Full render ───────────────────────────────────────────────────────────
function render() { renderTabs(); renderTreeMeta(); renderList(); }

// ─── Static bindings ───────────────────────────────────────────────────────
document.getElementById('btn-copy').onclick = () => {
  const text = serialize();
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => toast('Скопировано!')).catch(() => copyFallback(text));
  } else {
    copyFallback(text);
  }
};
function copyFallback(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, text.length);
  try { document.execCommand('copy'); toast('Скопировано!'); }
  catch { toast('Не удалось скопировать'); }
  document.body.removeChild(ta);
}
document.getElementById('btn-save').onclick  = saveFile;
document.getElementById('overlay').onclick   = closeSheet;
document.getElementById('sheet-close').onclick = closeSheet;
document.getElementById('sheet-del').onclick = delNode;

document.getElementById('tabs').addEventListener('click', e => {
  const ti = e.target.closest('[data-ti]');
  if (ti) { S.activeIdx = +ti.dataset.ti; S.selId = null; closeSheet(); render(); return; }
  if (e.target.id === 'btn-add-tree') addTree();
});

// ─── Boot ──────────────────────────────────────────────────────────────────
render();
</script>
