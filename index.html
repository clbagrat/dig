<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dig Path Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="game"></canvas>
      <div class="touch-zones">
        <div id="movePad" class="move-pad">
          <div id="moveStick" class="move-stick"></div>
        </div>
      </div>
      <div id="perkChoice" class="perk-choice" hidden>
        <div class="perk-choice__panel">
          <div class="perk-choice__title">Выбери апгрейд</div>
          <div class="perk-choice__subtitle">Мощный апгрейд за каждые 30 скрапа</div>
          <div class="perk-choice__actions">
            <button id="perkReroll" class="perk-choice__reroll" type="button">Реролл</button>
            <span id="perkRerollCount" class="perk-choice__reroll-count">0</span>
          </div>
          <div class="perk-choice__options">
            <button class="perk-option" data-perk-slot="0"></button>
            <button class="perk-option" data-perk-slot="1"></button>
            <button class="perk-option" data-perk-slot="2"></button>
          </div>
        </div>
      </div>
      <div id="debugPerkMenu" class="debug-perk-menu" hidden>
        <div class="debug-perk-menu__panel">
          <div class="debug-perk-menu__head">
            <div>
              <div class="debug-perk-menu__title">Debug Perks</div>
              <div class="debug-perk-menu__subtitle">Тап по SEED открывает это меню</div>
            </div>
            <button id="debugPerkClose" class="debug-perk-menu__close" type="button">Закрыть</button>
          </div>
          <div class="debug-perk-menu__section">
            <div class="debug-perk-menu__label">Tile Perks</div>
            <div id="debugTilePerks" class="debug-perk-menu__grid"></div>
          </div>
          <div class="debug-perk-menu__section">
            <div class="debug-perk-menu__label">Scrap Perks</div>
            <div id="debugScrapPerks" class="debug-perk-menu__grid"></div>
          </div>
        </div>
      </div>
      <div id="fatalError" class="fatal-error" hidden>
        <div class="fatal-error__panel">
          <div class="fatal-error__title">Runtime Error</div>
          <div class="fatal-error__subtitle">Скопируй текст ниже и пришли мне.</div>
          <pre id="fatalErrorText" class="fatal-error__text"></pre>
        </div>
      </div>
    </div>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
