<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dig Path Prototype</title>
    <link rel="stylesheet" href="./styles.css?v=20260320-1" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="game"></canvas>
      <button id="manualOpen" class="manual-link" type="button" aria-label="Открыть руководство">?</button>
      <div class="touch-zones">
        <div id="movePad" class="move-pad">
          <div id="moveStick" class="move-stick"></div>
        </div>
      </div>
      <div id="manualModal" class="manual-modal" hidden>
        <div class="manual-modal__panel">
          <div class="manual-modal__head">
            <div class="manual-modal__title">Руководство</div>
            <button id="manualClose" class="manual-modal__close" type="button">Закрыть</button>
          </div>
          <iframe
            id="manualFrame"
            class="manual-modal__frame"
            src="./manual.html"
            title="Руководство по игре"
            loading="lazy"
          ></iframe>
        </div>
      </div>
      <div id="perkChoice" class="perk-choice" hidden>
        <div class="perk-choice__panel">
          <div class="perk-choice__title">Выбери апгрейд</div>
          <div class="perk-choice__subtitle">Апгрейд за 30 золота</div>
          <div class="perk-choice__actions">
            <button id="perkReroll" class="perk-choice__reroll" type="button">Реролл</button>
            <span id="perkRerollCount" class="perk-choice__reroll-count">0</span>
          </div>
          <div class="perk-choice__options">
            <button class="perk-option" data-perk-slot="0"></button>
            <button class="perk-option" data-perk-slot="1"></button>
            <button class="perk-option" data-perk-slot="2"></button>
          </div>
        </div>
      </div>
      <div id="crystalReward" class="crystal-reward" hidden>
        <div class="crystal-reward__panel">
          <div class="crystal-reward__title">Рецепт собран</div>
          <div class="crystal-reward__subtitle">Ты получил 2 тайловых перка и 1 реролл</div>
          <div class="crystal-reward__cards">
            <div id="crystalRewardCard0" class="crystal-reward__card"></div>
            <div id="crystalRewardCard1" class="crystal-reward__card"></div>
          </div>
          <button id="crystalRewardClose" class="crystal-reward__close" type="button" disabled>Продолжить</button>
        </div>
      </div>
      <div id="debugPerkMenu" class="debug-perk-menu" hidden>
        <div class="debug-perk-menu__panel">
          <div class="debug-perk-menu__head">
            <div>
              <div class="debug-perk-menu__title">Debug Perks</div>
              <div class="debug-perk-menu__subtitle">Тап по SEED открывает это меню</div>
            </div>
            <button id="debugPerkClose" class="debug-perk-menu__close" type="button">Закрыть</button>
          </div>
          <div class="debug-perk-menu__section">
            <div class="debug-perk-menu__label">Gold</div>
            <div class="debug-perk-menu__grid">
              <button id="debugAddGold" type="button" class="debug-perk-menu__button">+100 ●</button>
              <button id="debugAddUnsafeGold" type="button" class="debug-perk-menu__button">+100 ⚠️●</button>
            </div>
          </div>
          <div class="debug-perk-menu__section">
            <div class="debug-perk-menu__label">Tile Perks</div>
            <div id="debugTilePerks" class="debug-perk-menu__grid"></div>
          </div>
          <div class="debug-perk-menu__section">
            <div class="debug-perk-menu__label">Gold Perks</div>
            <div id="debugGoldPerks" class="debug-perk-menu__grid"></div>
          </div>
        </div>
      </div>
      <div id="shopModal" class="shop-modal" hidden></div>

      <div id="fatalError" class="fatal-error" hidden>
        <div class="fatal-error__panel">
          <div class="fatal-error__title">Runtime Error</div>
          <div class="fatal-error__subtitle">Скопируй текст ниже и пришли мне.</div>
          <pre id="fatalErrorText" class="fatal-error__text"></pre>
        </div>
      </div>
    </div>
    <script type="module" src="./src/game.js?v=39"></script>
  </body>
</html>
